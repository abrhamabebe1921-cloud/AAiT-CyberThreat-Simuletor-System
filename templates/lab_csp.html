<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Security Policy (CSP) Lab</title>
    <link rel="stylesheet" href="/static/css/style_v4.css">
    <style>
        body {
            background: #050510;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(10, 10, 15, 0.7);
            border-radius: 12px;
            backdrop-filter: blur(12px);
        }

        .title {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .output {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        input[type=text] {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
        }

        button {
            margin-top: 12px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #eee 0%, #aaa 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <nav>
        <div class="brand">ThreatMapper Labs</div><a href="/dashboard">← Back</a>
    </nav>
    <div class="container">
        <h1 class="title">CSP Lab <span>Role: {{ role|default('guest') }}</span></h1>
        <p>This page sets a weak Content‑Security‑Policy header. Try to inject a script.</p>
        <form method="GET">
            <input type="text" name="payload" placeholder="e.g., <script>alert(1)</script>" />
            <button type="submit">Send</button>
        </form>
        {% if request.args.get('payload') %}
        <div class="output">
            {{ request.args.get('payload')|safe }}
        </div>
        {% endif %}
    </div>
</body>

</html>
